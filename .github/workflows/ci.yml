name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dealership
          POSTGRES_PASSWORD: dealership
          POSTGRES_DB: dealership
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U dealership"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dealership:dealership@localhost:5434/dealership?schema=public
      TEST_DATABASE_URL: postgresql://dealership:dealership@localhost:5434/dealership_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: PGPASSWORD=dealership psql -h localhost -p 5434 -U dealership -d dealership -c "CREATE DATABASE dealership_test;"

      - name: Generate Prisma client
        run: npm run prisma:generate -w server

      - name: Typecheck
        run: |
          npx tsc --noEmit -p server/tsconfig.json
          npm run build -w client

      - name: Backend tests
        run: npm run test:server

      - name: Frontend tests
        run: npm run test:client
